    <!-- Lovable staging-subdomain de-indexing: inject noindex + meta-refresh
         BEFORE any other tag if we're served from *.lovable.app. This is the
         closest signal to a real 301 we can emit from a static build. -->
    <script>
      (function () {
        try {
          var h = location.hostname;
          if (h === 'repricer.lovable.app' || /\.lovable\.app$/.test(h)) {
            var target = 'https://inventorysprint.com' + location.pathname + location.search + location.hash;
            var r = document.createElement('meta');
            r.setAttribute('http-equiv', 'refresh');
            r.setAttribute('content', '0; url=' + target);
            document.head.appendChild(r);
            var n = document.createElement('meta');
            n.setAttribute('name', 'robots');
            n.setAttribute('content', 'noindex, follow');
            document.head.appendChild(n);
            location.replace(target);
          }
        } catch (e) {}
      })();
    </script>
