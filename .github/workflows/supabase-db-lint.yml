name: Supabase DB Lint

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-db-lint.yml'
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  lint:
    name: supabase db lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Runs the same PL/pgSQL linter that the migration tool runs post-apply.
      # Fails the build on any error-level finding (missing RLS, unsafe search_path, etc.).
      # This is a second gate on the PR path — the migration tool already gates on
      # the linter at apply time; this catches regressions before the migration is even proposed.
      - name: Lint migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: mstibdszibcheodvnprm
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN not set — skipping remote lint. Add it in repo Settings → Secrets to enable the gate."
            exit 0
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          supabase db lint --level error
