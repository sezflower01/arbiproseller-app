<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ArbiProSeller</title>
  <link rel="stylesheet" href="panel.css" />
  <style>
    body { width: 280px; padding: 14px; }
    .pop-row { display: flex; flex-direction: column; gap: 8px; }
    .pop-status { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="pop-row">
    <div class="apx-brand"><span class="apx-logo">⚡</span><strong>ArbiProSeller</strong></div>
    <div class="pop-status" id="pop-status">Checking session…</div>
    <button id="pop-signin" class="apx-primary">Sign in</button>
    <button id="pop-signout" class="apx-primary hidden" style="background:#374151">Sign out</button>
    <a id="pop-open" class="pop-status" target="_blank">Open ArbiProSeller →</a>
  </div>
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
